<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Livro — GoldenLibrary</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --bg: #0D0D0D;
            --bg-card: #141414;
            --text: #F0EAD6;
            --text-muted: #7A7060;
            --border: #2A2520;
            --input-bg: #111111;
            --error: #F87171;
            --success: #6EE7B7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 2rem 4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gold);
            text-decoration: none;
        }

        .logo span { color: var(--text); font-weight: 400; }

        .btn-voltar {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            transition: color 0.2s, border-color 0.2s;
        }

        .btn-voltar:hover { color: var(--text); border-color: var(--text-muted); }

        main {
            max-width: 560px;
            margin: 5rem auto;
            padding: 0 2rem;
            animation: fadeInUp 0.4s ease both;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-title em { color: var(--gold); font-style: italic; }

        .page-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .form-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }

        label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* AJUSTADO: Seletor compartilhado para manter inputs e selects idênticos */
        input, select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            padding: 0.75rem 1rem;
            transition: border-color 0.2s;
            outline: none;
            width: 100%;
        }

        /* AJUSTADO: Estilização da seta customizada do select */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%237A7060' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position: right 1rem center;
        }

        input:focus, select:focus { border-color: var(--gold); }
        input::placeholder { color: var(--text-muted); }

        .btn-submit {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--bg);
            background-color: var(--gold);
            border: none;
            padding: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.15s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover { background-color: var(--gold-light); transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .feedback {
            display: none;
            padding: 0.85rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            text-align: center;
        }

        .feedback.success {
            display: block;
            background: rgba(110,231,183,.1);
            border: 1px solid rgba(110,231,183,.25);
            color: var(--success);
        }

        .feedback.error {
            display: block;
            background: rgba(248,113,113,.1);
            border: 1px solid rgba(248,113,113,.2);
            color: var(--error);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <a href="/home.html" class="logo">Golden<span>Library</span></a>
    <a href="/home.html" class="btn-voltar">← Voltar ao Acervo</a>
</header>

<main>
    <h1 class="page-title">Editar <em>Livro</em></h1>
    <p class="page-subtitle">Altere os dados do livro e salve as mudanças.</p>

    <input type="hidden" id="bookId" />

    <div class="form-card">
        <div class="form-group">
            <label for="title">Título</label>
            <input type="text" id="title" placeholder="Ex: Dom Casmurro" />
        </div>

        <div class="form-group">
            <label for="author">Autor</label>
            <input type="text" id="author" placeholder="Ex: Machado de Assis" />
        </div>

        <div class="form-group">
            <label for="genre">Gênero</label>
            <input type="text" id="genre" placeholder="Ex: Romance, Suspense, Biografia" />
        </div>

        <div class="form-group">
            <label for="status">Status de Leitura</label>
            <select id="status">
                <option value="" disabled>Selecione o status</option>
                <option value="WANT_TO_READ">Quero Ler</option>
                <option value="READING">Lendo</option>
                <option value="READ">Lido</option>
            </select>
        </div>

        <div id="feedback" class="feedback"></div>

        <button class="btn-submit" id="btnSalvar" onclick="salvarEdicao()">Salvar Alterações</button>
    </div>
</main>

<script>
    const token = localStorage.getItem('token');
    const urlParams = new URLSearchParams(window.location.search);
    const idDoLivro = urlParams.get('id');

    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('token');
        if (!token || !idDoLivro) {
            window.location.href = '/home.html';
            return;
        }
        buscarDadosDoLivro();
    });

    async function buscarDadosDoLivro() {
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`/books/${idDoLivro}`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const book = await res.json();
                document.getElementById('bookId').value = book.id;
                document.getElementById('title').value = book.title;
                document.getElementById('author').value = book.author;
                document.getElementById('genre').value = book.genre || '';
                document.getElementById('status').value = book.status || '';
            } else {
                alert('Erro ao buscar dados do livro.');
                window.location.href = '/home.html';
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function salvarEdicao() {
        const token = localStorage.getItem('token');
        const id       = document.getElementById('bookId').value;
        const title    = document.getElementById('title').value.trim();
        const author   = document.getElementById('author').value.trim();
        const genre    = document.getElementById('genre').value.trim();
        const status   = document.getElementById('status').value;
        const feedback = document.getElementById('feedback');
        const btn      = document.getElementById('btnSalvar');

        feedback.className = 'feedback';
        feedback.textContent = '';

        if (!title || !author || !genre || !status) {
            feedback.className = 'feedback error';
            feedback.textContent = 'Preencha todos os campos corretamente.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Salvando...';

        try {
            const res = await fetch(`/books/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ title, author, genre, status })
            });

            if (res.ok) {
                feedback.className = 'feedback success';
                feedback.textContent = 'Livro editado com sucesso!';
                setTimeout(() => window.location.href = '/home.html', 1500);
            } else {
                feedback.className = 'feedback error';
                feedback.textContent = 'Erro ao atualizar. Tente novamente.';
            }
        } catch (e) {
            feedback.className = 'feedback error';
            feedback.textContent = 'Erro de conexão com o servidor.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Salvar Alterações';
        }
    }
</script>
</body>
</html>
