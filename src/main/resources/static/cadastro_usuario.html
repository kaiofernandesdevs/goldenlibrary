<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Criar Conta — GoldenLibrary</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --bg: #0D0D0D;
            --bg-card: #141414;
            --text: #F0EAD6;
            --text-muted: #7A7060;
            --border: #2A2520;
            --input-bg: #111111;
            --error: #F87171;
            --success: #6EE7B7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 2rem 4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            color: var(--gold);
            text-decoration: none;
        }

        .logo span { color: var(--text); font-weight: 400; }

        .btn-voltar {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            transition: color 0.2s, border-color 0.2s;
        }

        .btn-voltar:hover { color: var(--text); border-color: var(--text-muted); }

        main {
            max-width: 560px;
            margin: 5rem auto;
            padding: 0 2rem;
            animation: fadeInUp 0.4s ease both;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-title em { color: var(--gold); font-style: italic; }

        .page-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .form-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }

        label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            padding: 0.75rem 1rem;
            transition: border-color 0.2s;
            outline: none;
            width: 100%;
        }

        input:focus { border-color: var(--gold); }
        input::placeholder { color: var(--text-muted); }

        .btn-submit {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--bg);
            background-color: var(--gold);
            border: none;
            padding: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.15s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover { background-color: var(--gold-light); transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .feedback {
            display: none;
            padding: 0.85rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            text-align: center;
        }

        .feedback.success {
            display: block;
            background: rgba(110,231,183,.1);
            border: 1px solid rgba(110,231,183,.25);
            color: var(--success);
        }

        .feedback.error {
            display: block;
            background: rgba(248,113,113,.1);
            border: 1px solid rgba(248,113,113,.2);
            color: var(--error);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <a href="/home.html" class="logo">Golden<span>Library</span></a>
    <a href="/login.html" class="btn-voltar">← Voltar ao Login</a>
</header>

<main>
    <h1 class="page-title">Criar <em>Conta</em></h1>
    <p class="page-subtitle">Preencha seus dados pessoais e de endereço para se cadastrar.</p>

    <div class="form-card">
        <div class="form-group">
            <label for="name">Nome Completo</label>
            <input type="text" id="name" placeholder="Ex: Machado de Assis" />
        </div>
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Ex: machado@email.com" />
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
        </div>

        <hr style="border: none; border-top: 1px solid var(--border); margin: 0.5rem 0;" />

        <div class="form-group">
            <label for="cep">CEP</label>
            <input type="text" id="cep" placeholder="Ex: 01001000" maxlength="9" />
        </div>
        <div class="form-group">
            <label for="logradouro">Logradouro</label>
            <input type="text" id="logradouro" readonly style="opacity: 0.6; cursor: not-allowed;" />
        </div>
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 2;">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" readonly style="opacity: 0.6; cursor: not-allowed;" />
            </div>
            <div class="form-group" style="flex: 2;">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" readonly style="opacity: 0.6; cursor: not-allowed;" />
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="uf">UF</label>
                <input type="text" id="uf" readonly style="opacity: 0.6; cursor: not-allowed; text-align: center;" />
            </div>
        </div>

        <div id="feedback" class="feedback"></div>
        <button class="btn-submit" id="btnSalvar">Criar Minha Conta</button>
    </div>
</main>

<script>
    const inputCep = document.getElementById('cep');
    inputCep.addEventListener('blur', async () => {
        let cepDigitado = inputCep.value.replace(/\D/g, '');
        if (cepDigitado.length === 8) {
            try {
                const res = await fetch(`https://viacep.com.br/ws/${cepDigitado}/json/`);
                const data = await res.json();
                if (data.erro) {
                    alert("CEP não encontrado.");
                    return;
                }
                document.getElementById('logradouro').value = data.logradouro;
                document.getElementById('bairro').value = data.bairro;
                document.getElementById('cidade').value = data.localidade;
                document.getElementById('uf').value = data.uf;
            } catch (error) {
                alert("Erro ao buscar o CEP.");
            }
        }
    });

    document.getElementById('btnSalvar').addEventListener('click', async () => {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const cep = document.getElementById('cep').value;
        const logradouro = document.getElementById('logradouro').value;
        const bairro = document.getElementById('bairro').value;
        const cidade = document.getElementById('cidade').value;
        const uf = document.getElementById('uf').value;
        const feedback = document.getElementById('feedback');

        if(!name || !email || !password) {
            feedback.className = 'feedback error';
            feedback.textContent = 'Preencha nome, email e senha!';
            return;
        }

        try {
            const res = await fetch('/user/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, cep, logradouro, bairro, cidade, uf })
            });

            if (res.ok) {
                feedback.className = 'feedback success';
                feedback.textContent = 'Conta criada com sucesso!';
                setTimeout(() => window.location.href = '/login.html', 1500);
            } else {
                feedback.className = 'feedback error';
                feedback.textContent = 'Erro ao criar conta. E-mail pode já estar em uso.';
            }
        } catch(e) {
            feedback.className = 'feedback error';
            feedback.textContent = 'Erro de conexão com o servidor.';
        }
    });
</script>
</body>
</html>
