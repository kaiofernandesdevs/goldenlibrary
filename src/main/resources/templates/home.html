<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GoldenLibrary</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --bg: #0D0D0D;
            --bg-card: #141414;
            --bg-card-hover: #1C1C1C;
            --text: #F0EAD6;
            --text-muted: #7A7060;
            --border: #2A2520;
            --error: #F87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 2rem 4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            color: var(--gold);
        }

        .logo span { color: var(--text); font-weight: 400; }

        .btn-cadastrar {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--bg);
            background-color: var(--gold);
            padding: 0.65rem 1.5rem;
            border-radius: 2rem;
            transition: background-color 0.2s, transform 0.15s;
        }

        .btn-cadastrar:hover { background-color: var(--gold-light); transform: translateY(-1px); }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 3rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .section-title em { color: var(--gold); font-style: italic; }

        .book-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .empty-state {
            text-align: center;
            padding: 6rem 2rem;
            border: 1px dashed var(--border);
            border-radius: 8px;
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.4; }

        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .empty-state p { font-size: 0.9rem; color: var(--text-muted); }

        .table-wrapper {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            animation: fadeInUp 0.4s ease both;
        }

        table { width: 100%; border-collapse: collapse; }

        thead {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        thead th {
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        thead th:last-child { text-align: center; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background-color 0.15s;
            animation: fadeInUp 0.3s ease both;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background-color: var(--bg-card-hover); }
        tbody td { padding: 1.2rem 1.5rem; font-size: 0.95rem; }

        .td-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
        }

        .td-author { color: var(--text-muted); font-size: 0.9rem; }

        .td-year {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--gold-light);
        }

        .td-id {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .td-actions { text-align: center; }
        .actions-wrap { display: flex; gap: 0.5rem; justify-content: center; }

        .btn-edit, .btn-delete {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-edit {
            background: rgba(201,168,76,.15);
            color: var(--gold-light);
            border: 1px solid rgba(201,168,76,.3);
        }

        .btn-edit:hover { opacity: 0.8; transform: translateY(-1px); }

        .btn-delete {
            background: rgba(248,113,113,.1);
            color: var(--error);
            border: 1px solid rgba(248,113,113,.25);
        }

        .btn-delete:hover { opacity: 0.8; transform: translateY(-1px); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            animation: fadeInUp 0.25s ease both;
        }

        .modal h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
        }

        .modal p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; }

        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }

        .btn-cancelar {
            font-size: 0.85rem;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .btn-cancelar:hover { color: var(--text); border-color: var(--text-muted); }

        .btn-confirmar {
            font-size: 0.85rem;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            border: none;
            background: var(--error);
            color: #fff;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-confirmar:hover { opacity: 0.85; }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 4rem;
            letter-spacing: 0.08em;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        tbody tr:nth-child(1) { animation-delay: 0.05s; }
        tbody tr:nth-child(2) { animation-delay: 0.10s; }
        tbody tr:nth-child(3) { animation-delay: 0.15s; }
        tbody tr:nth-child(4) { animation-delay: 0.20s; }
        tbody tr:nth-child(5) { animation-delay: 0.25s; }
    </style>
</head>
<body>

<header>
    <div class="logo">Golden<span>Library</span></div>
    <a href="/cadastro" class="btn-cadastrar">+ Cadastrar Livro</a>
</header>

<main>
    <div class="section-header">
        <h1 class="section-title">Nosso <em>Acervo</em></h1>
        <span class="book-count" th:text="${#lists.size(books)} + ' livro(s) cadastrado(s)'"></span>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(books)}">
        <div class="icon">📚</div>
        <h3>Nenhum livro cadastrado</h3>
        <p>Clique em "Cadastrar Livro" para adicionar o primeiro.</p>
    </div>

    <div class="table-wrapper" th:if="${not #lists.isEmpty(books)}">
        <table>
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Ano</th>
                    <th>ID</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td class="td-title"  th:text="${book.title}">Título</td>
                    <td class="td-author" th:text="${book.author}">Autor</td>
                    <td class="td-year"   th:text="${book.year}">Ano</td>
                    <td class="td-id"     th:text="${book.id}">id</td>
                    <td class="td-actions">
                        <div class="actions-wrap">
                            <a class="btn-edit" th:href="@{/editar/{id}(id=${book.id})}">Editar</a>
                            <button class="btn-delete"
                                    th:data-id="${book.id}"
                                    th:data-title="${book.title}"
                                    onclick="confirmarDelete(this)">Deletar</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Modal de confirmação -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>Confirmar exclusão</h3>
        <p id="modalMsg">Tem certeza que deseja excluir este livro?</p>
        <div class="modal-actions">
            <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
            <button class="btn-confirmar" id="btnConfirmar">Excluir</button>
        </div>
    </div>
</div>

<footer>GoldenLibrary &mdash; Sistema de Gerenciamento de Acervo</footer>

<script>
    let idParaDeletar = null;

    function confirmarDelete(btn) {
        idParaDeletar = btn.getAttribute('data-id');
        const title = btn.getAttribute('data-title');
        document.getElementById('modalMsg').textContent = `Tem certeza que deseja excluir "${title}"?`;
        document.getElementById('modalOverlay').classList.add('active');
    }

    function fecharModal() {
        idParaDeletar = null;
        document.getElementById('modalOverlay').classList.remove('active');
    }

    document.getElementById('btnConfirmar').addEventListener('click', async () => {
        if (!idParaDeletar) return;
        try {
            const res = await fetch(`/api/books/${idParaDeletar}`, { method: 'DELETE' });
            if (res.ok) {
                window.location.reload();
            } else {
                alert('Erro ao excluir o livro.');
            }
        } catch (e) {
            alert('Erro de conexão.');
        } finally {
            fecharModal();
        }
    });
</script>

</body>
</html>
